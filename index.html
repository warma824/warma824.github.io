<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spendly">
<meta name="theme-color" content="#6c5ce7">
<title>Spendly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #6c5ce7;
    --pink: #e84393;
    --teal: #00b894;
    --amber: #fdcb6e;
    --coral: #e17055;
    --blue: #0984e3;
    --bg: #f0eeff;
    --card: #ffffff;
    --text: #2d2d44;
    --muted: #9b97b8;
    --border: rgba(108,92,231,0.12);
    --cat-food: #6c5ce7;
    --cat-drinks: #e84393;
    --cat-shopping: #00b894;
    --cat-transport: #0984e3;
    --cat-entertainment: #fdcb6e;
    --cat-other: #b2bec3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
  
  /* APP SHELL */
  #app { height: 100dvh; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; overflow: hidden; }
  
  /* HEADER */
  .header {
    background: linear-gradient(145deg, var(--purple) 0%, #a855f7 50%, var(--pink) 100%);
    padding: env(safe-area-inset-top, 12px) 20px 24px;
    padding-top: max(env(safe-area-inset-top), 52px);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .header::before {
    content: '';
    position: absolute;
    width: 200px; height: 200px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
    top: -60px; right: -40px;
  }
  .header::after {
    content: '';
    position: absolute;
    width: 120px; height: 120px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    top: 30px; right: 60px;
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; position: relative; z-index: 1; }
  .header-week { color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .settings-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 36px; height: 36px; border-radius: 12px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .budget-remaining { color: white; font-size: 46px; font-weight: 900; line-height: 1; position: relative; z-index: 1; }
  .budget-remaining span { font-size: 22px; font-weight: 700; opacity: 0.8; vertical-align: super; }
  .budget-label { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; margin-top: 4px; margin-bottom: 16px; position: relative; z-index: 1; }
  .progress-wrap { position: relative; z-index: 1; }
  .progress-track { background: rgba(255,255,255,0.25); border-radius: 99px; height: 10px; overflow: hidden; }
  .progress-bar { background: white; height: 10px; border-radius: 99px; transition: width 0.6s cubic-bezier(.34,1.56,.64,1); }
  .progress-meta { display: flex; justify-content: space-between; margin-top: 6px; }
  .progress-meta span { color: rgba(255,255,255,0.75); font-size: 12px; font-weight: 700; }
  .over-budget .progress-bar { background: var(--amber); }
  .over-budget .budget-remaining { color: var(--amber); }

  /* TABS */
  .tabs { display: flex; gap: 8px; padding: 14px 20px 0; flex-shrink: 0; }
  .tab { flex: 1; text-align: center; font-size: 13px; font-weight: 800; padding: 9px 0; border-radius: 12px; cursor: pointer; transition: all 0.2s; color: var(--muted); background: transparent; border: none; }
  .tab.active { background: var(--card); color: var(--purple); box-shadow: 0 2px 12px rgba(108,92,231,0.15); }

  /* SCROLLABLE BODY */
  .body { flex: 1; overflow-y: auto; padding: 14px 20px calc(env(safe-area-inset-bottom, 0px) + 90px); -webkit-overflow-scrolling: touch; }
  
  /* SECTION LABEL */
  .section-label { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin: 16px 0 8px; }
  .section-label:first-child { margin-top: 4px; }
  
  /* EXPENSE ITEM */
  .expense-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--card); border-radius: 16px;
    padding: 12px 14px; margin-bottom: 8px;
    border: 1px solid var(--border);
    animation: slideIn 0.25s ease;
    transition: transform 0.1s;
    cursor: default;
  }
  .expense-item:active { transform: scale(0.98); }
  @keyframes slideIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .cat-icon { width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .exp-info { flex: 1; min-width: 0; }
  .exp-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exp-cat { font-size: 11px; font-weight: 600; color: var(--muted); margin-top: 1px; }
  .exp-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .exp-amt { font-size: 16px; font-weight: 900; color: var(--text); }
  .delete-btn { background: none; border: none; color: #ddd; font-size: 16px; cursor: pointer; padding: 2px; line-height: 1; }
  .delete-btn:active { color: var(--coral); }
  
  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; font-weight: 700; }
  .empty-state small { font-size: 12px; }

  /* HISTORY VIEW */
  .history-week { background: var(--card); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid var(--border); }
  .history-week-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .history-week-title { font-size: 14px; font-weight: 800; color: var(--text); }
  .history-badge { font-size: 12px; font-weight: 800; padding: 3px 10px; border-radius: 99px; }
  .badge-ok { background: #e8fdf5; color: #00b894; }
  .badge-over { background: #fff3e0; color: var(--coral); }
  .history-amounts { display: flex; gap: 8px; }
  .history-amounts div { flex: 1; background: var(--bg); border-radius: 10px; padding: 8px 10px; }
  .history-amounts .hlabel { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .history-amounts .hval { font-size: 16px; font-weight: 900; color: var(--text); margin-top: 2px; }
  .history-bar { height: 6px; background: #eee; border-radius: 99px; margin-top: 10px; overflow: hidden; }
  .history-bar-fill { height: 6px; border-radius: 99px; background: linear-gradient(90deg, var(--purple), var(--pink)); }

  /* ADD BUTTON */
  .fab {
    position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 24px); left: 50%; transform: translateX(-50%);
    width: calc(100% - 40px); max-width: 390px;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white; border: none; border-radius: 18px;
    padding: 16px; font-size: 16px; font-weight: 800;
    cursor: pointer; letter-spacing: 0.3px;
    box-shadow: 0 8px 24px rgba(108,92,231,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: 'Nunito', sans-serif;
    z-index: 10;
  }
  .fab:active { transform: translateX(-50%) scale(0.97); box-shadow: 0 4px 12px rgba(108,92,231,0.3); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(30,20,60,0.55);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
    padding: 0;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); border-radius: 28px 28px 0 0;
    padding: 20px 20px calc(env(safe-area-inset-bottom, 0px) + 24px);
    width: 100%; max-width: 430px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.34,1.26,.64,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: #e0e0e0; border-radius: 99px; margin: 0 auto 20px; }
  .modal h2 { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 18px; }
  .modal label { font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; margin-top: 14px; }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal select {
    width: 100%; padding: 13px 14px;
    border: 1.5px solid var(--border); border-radius: 14px;
    font-size: 16px; font-family: 'Nunito', sans-serif; font-weight: 700;
    color: var(--text); background: var(--bg);
    outline: none; appearance: none;
  }
  .modal input:focus, .modal select:focus { border-color: var(--purple); }
  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cat-btn { padding: 10px 6px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; color: var(--muted); cursor: pointer; text-align: center; transition: all 0.15s; }
  .cat-btn .cat-emoji { font-size: 20px; display: block; margin-bottom: 3px; }
  .cat-btn.selected { border-width: 2px; background: var(--card); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-cancel { flex: 1; padding: 14px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: var(--muted); cursor: pointer; }
  .btn-add { flex: 2; padding: 14px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--purple), var(--pink)); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: white; cursor: pointer; }

  /* SETTINGS MODAL */
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .settings-row:last-child { border-bottom: none; }
  .settings-label { font-size: 14px; font-weight: 800; color: var(--text); }
  .settings-hint { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .settings-input { width: 100px; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: 800; color: var(--text); background: var(--bg); outline: none; text-align: right; }
  .settings-input:focus { border-color: var(--purple); }
  .btn-save { width: 100%; padding: 14px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--purple), var(--pink)); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: white; cursor: pointer; margin-top: 20px; }
</style>
</head>
<body>
<div id="app">
  <div class="header" id="header">
    <div class="header-top">
      <div>
        <div class="header-week" id="weekLabel">Week of —</div>
        <div class="budget-remaining"><span>$</span><span id="remainingAmt">0</span></div>
        <div class="budget-label">left this week</div>
      </div>
      <button class="settings-btn" onclick="openSettings()">⚙️</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-meta">
        <span id="spentLabel">$0 spent</span>
        <span id="pctLabel">0% used</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('week',this)">This week</button>
    <button class="tab" onclick="showTab('history',this)">History</button>
  </div>

  <div class="body" id="mainBody"></div>

  <button class="fab" id="fabBtn" onclick="openAdd()">+ Add expense</button>
</div>

<!-- ADD EXPENSE MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Add expense</h2>
    <label>Amount ($)</label>
    <input type="number" id="inputAmt" inputmode="decimal" placeholder="0.00" step="0.01">
    <label>What was it?</label>
    <input type="text" id="inputName" placeholder="e.g. Flat white">
    <label>Category</label>
    <div class="cat-grid" id="catGrid"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
      <button class="btn-add" onclick="addExpense()">Add</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Settings</h2>
    <div class="settings-row">
      <div>
        <div class="settings-label">Weekly budget</div>
        <div class="settings-hint">Resets every Wednesday at 5am</div>
      </div>
      <input class="settings-input" type="number" id="budgetInput" inputmode="decimal" placeholder="150">
    </div>
    <button class="btn-save" onclick="saveBudget()">Save</button>
  </div>
</div>

<script>
const CATS = [
  { id:'food',          label:'Food & Coffee',  emoji:'☕', color:'#6c5ce7' },
  { id:'drinks',        label:'Drinks & Bars',  emoji:'🍸', color:'#e84393' },
  { id:'shopping',      label:'Shopping',       emoji:'🛍️', color:'#00b894' },
  { id:'transport',     label:'Transport',      emoji:'🚗', color:'#0984e3' },
  { id:'entertainment', label:'Entertainment',  emoji:'🎉', color:'#fdcb6e' },
  { id:'other',         label:'Other',          emoji:'📦', color:'#b2bec3' },
];

function loadData() {
  return JSON.parse(localStorage.getItem('spendly_data') || '{"budget":150,"expenses":[]}');
}
function saveData(d) {
  localStorage.setItem('spendly_data', JSON.stringify(d));
}

// Returns Wednesday 5am start of current budget week
function getWeekStart(from) {
  const d = from ? new Date(from) : new Date();
  const day = d.getDay(); // 0=Sun ... 3=Wed
  const diff = (day >= 3) ? (day - 3) : (day + 4);
  const start = new Date(d);
  start.setDate(d.getDate() - diff);
  start.setHours(5, 0, 0, 0);
  // If today is Wednesday but before 5am, go back a week
  if (from === undefined && new Date() < start) {
    start.setDate(start.getDate() - 7);
  }
  return start;
}

function getWeekEnd(start) {
  const end = new Date(start);
  end.setDate(start.getDate() + 7);
  return end;
}

function formatDate(d) {
  return d.toLocaleDateString('en-NZ', { day:'numeric', month:'short' });
}

function fmtAmt(n) {
  return n.toFixed(2).replace(/\.00$/, '');
}

let currentTab = 'week';
let selectedCat = 'food';

function initCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c.id === selectedCat ? ' selected' : '');
    btn.style.setProperty('--c', c.color);
    if (c.id === selectedCat) {
      btn.style.borderColor = c.color;
      btn.style.color = c.color;
    }
    btn.innerHTML = `<span class="cat-emoji">${c.emoji}</span>${c.label}`;
    btn.onclick = () => {
      selectedCat = c.id;
      document.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.remove('selected');
        b.style.borderColor = '';
        b.style.color = '';
      });
      btn.classList.add('selected');
      btn.style.borderColor = c.color;
      btn.style.color = c.color;
    };
    grid.appendChild(btn);
  });
}

function openAdd() {
  document.getElementById('inputAmt').value = '';
  document.getElementById('inputName').value = '';
  selectedCat = 'food';
  initCatGrid();
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('inputAmt').focus(), 350);
}

function openSettings() {
  const d = loadData();
  document.getElementById('budgetInput').value = d.budget;
  document.getElementById('settingsModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function saveBudget() {
  const d = loadData();
  const val = parseFloat(document.getElementById('budgetInput').value);
  if (!isNaN(val) && val > 0) {
    d.budget = val;
    saveData(d);
    render();
  }
  closeModal('settingsModal');
}

function addExpense() {
  const amt = parseFloat(document.getElementById('inputAmt').value);
  const name = document.getElementById('inputName').value.trim();
  if (isNaN(amt) || amt <= 0) {
    document.getElementById('inputAmt').focus();
    return;
  }
  const label = name || CATS.find(c=>c.id===selectedCat).label;
  const d = loadData();
  d.expenses.push({
    id: Date.now(),
    amount: amt,
    name: label,
    category: selectedCat,
    date: new Date().toISOString()
  });
  saveData(d);
  closeModal('addModal');
  render();
}

function deleteExpense(id) {
  const d = loadData();
  d.expenses = d.expenses.filter(e => e.id !== id);
  saveData(d);
  render();
}

function showTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('fabBtn').style.display = tab === 'week' ? 'block' : 'none';
  render();
}

function groupByDay(expenses) {
  const groups = {};
  const today = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  expenses.forEach(e => {
    const d = new Date(e.date); d.setHours(0,0,0,0);
    let label;
    if (d.getTime() === today.getTime()) label = 'Today';
    else if (d.getTime() === yesterday.getTime()) label = 'Yesterday';
    else label = d.toLocaleDateString('en-NZ', { weekday:'long', day:'numeric', month:'short' });
    if (!groups[label]) groups[label] = [];
    groups[label].push(e);
  });
  return groups;
}

function renderWeek() {
  const d = loadData();
  const weekStart = getWeekStart();
  const weekEnd = getWeekEnd(weekStart);
  const weekExpenses = d.expenses.filter(e => {
    const t = new Date(e.date);
    return t >= weekStart && t < weekEnd;
  }).sort((a,b) => new Date(b.date)-new Date(a.date));

  const spent = weekExpenses.reduce((s,e)=>s+e.amount,0);
  const remaining = d.budget - spent;
  const pct = Math.min(100, (spent / d.budget) * 100);

  document.getElementById('weekLabel').textContent = 'Week of ' + formatDate(weekStart);
  document.getElementById('remainingAmt').textContent = Math.abs(remaining).toFixed(2).replace(/\.00$/,'');
  document.getElementById('spentLabel').textContent = '$' + fmtAmt(spent) + ' spent';
  document.getElementById('pctLabel').textContent = Math.round(pct) + '% used';
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('header').className = 'header' + (remaining < 0 ? ' over-budget' : '');

  const body = document.getElementById('mainBody');
  if (weekExpenses.length === 0) {
    body.innerHTML = `<div class="empty-state"><div class="emoji">🎉</div><p>No expenses yet!</p><small>Tap + Add expense to get started</small></div>`;
    return;
  }
  const groups = groupByDay(weekExpenses);
  let html = '';
  for (const [day, items] of Object.entries(groups)) {
    html += `<div class="section-label">${day}</div>`;
    items.forEach(e => {
      const cat = CATS.find(c=>c.id===e.category) || CATS[5];
      html += `<div class="expense-item">
        <div class="cat-icon" style="background:${cat.color}22">${cat.emoji}</div>
        <div class="exp-info">
          <div class="exp-name">${e.name}</div>
          <div class="exp-cat">${cat.label}</div>
        </div>
        <div class="exp-right">
          <div class="exp-amt">$${fmtAmt(e.amount)}</div>
          <button class="delete-btn" onclick="deleteExpense(${e.id})">✕</button>
        </div>
      </div>`;
    });
  }
  body.innerHTML = html;
}

function renderHistory() {
  const d = loadData();
  const body = document.getElementById('mainBody');
  // Build past weeks
  const weeks = [];
  let ws = getWeekStart();
  for (let i = 0; i < 8; i++) {
    const prevStart = new Date(ws);
    prevStart.setDate(ws.getDate() - 7 * (i+1));
    const prevEnd = new Date(prevStart);
    prevEnd.setDate(prevStart.getDate() + 7);
    const expenses = d.expenses.filter(e => {
      const t = new Date(e.date);
      return t >= prevStart && t < prevEnd;
    });
    if (expenses.length === 0 && i > 0) continue;
    weeks.push({ start: prevStart, end: prevEnd, expenses });
  }
  if (weeks.length === 0) {
    body.innerHTML = `<div class="empty-state"><div class="emoji">📅</div><p>No history yet</p><small>Come back next week!</small></div>`;
    return;
  }
  let html = '';
  weeks.forEach(w => {
    const spent = w.expenses.reduce((s,e)=>s+e.amount,0);
    const pct = Math.min(100,(spent/d.budget)*100);
    const saved = d.budget - spent;
    const ok = saved >= 0;
    html += `<div class="history-week">
      <div class="history-week-header">
        <div class="history-week-title">${formatDate(w.start)} – ${formatDate(w.end)}</div>
        <div class="history-badge ${ok?'badge-ok':'badge-over'}">${ok?'Under':'Over'}</div>
      </div>
      <div class="history-amounts">
        <div><div class="hlabel">Spent</div><div class="hval">$${fmtAmt(spent)}</div></div>
        <div><div class="hlabel">${ok?'Saved':'Over by'}</div><div class="hval" style="color:${ok?'#00b894':'#e17055'}">$${fmtAmt(Math.abs(saved))}</div></div>
        <div><div class="hlabel">Budget</div><div class="hval">$${fmtAmt(d.budget)}</div></div>
      </div>
      <div class="history-bar"><div class="history-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  });
  body.innerHTML = html;
}

function render() {
  if (currentTab === 'week') renderWeek();
  else renderHistory();
}

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

render();
setInterval(render, 60000);
</script>
</body>
