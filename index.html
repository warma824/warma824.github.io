<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spendly">
<meta name="theme-color" content="#6c5ce7">
<title>Spendly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="apple-touch-icon" href="icon-ios-1024x1024.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #6c5ce7;
    --pink: #e84393;
    --teal: #00b894;
    --amber: #fdcb6e;
    --coral: #e17055;
    --blue: #0984e3;
    --bg: #f0eeff;
    --card: #ffffff;
    --text: #2d2d44;
    --muted: #9b97b8;
    --border: rgba(108,92,231,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

  #app { height: 100dvh; display: flex; flex-direction: column; max-width: 430px; margin: 0 auto; position: relative; overflow: hidden; }

  /* HEADER */
  .header {
    background: linear-gradient(145deg, var(--purple) 0%, #a855f7 50%, var(--pink) 100%);
    padding: env(safe-area-inset-top, 12px) 20px 24px;
    padding-top: max(env(safe-area-inset-top), 52px);
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .header::before { content: ''; position: absolute; width: 200px; height: 200px; background: rgba(255,255,255,0.07); border-radius: 50%; top: -60px; right: -40px; }
  .header::after  { content: ''; position: absolute; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; top: 30px;  right: 60px; }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; position: relative; z-index: 1; }
  .header-week { color: rgba(255,255,255,0.75); font-size: 13px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .settings-btn { background: rgba(255,255,255,0.2); border: none; color: white; width: 36px; height: 36px; border-radius: 12px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .budget-remaining { color: white; font-size: 46px; font-weight: 900; line-height: 1; position: relative; z-index: 1; }
  .budget-remaining span { font-size: 22px; font-weight: 700; opacity: 0.8; vertical-align: super; }
  .budget-label { color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600; margin-top: 4px; margin-bottom: 16px; position: relative; z-index: 1; }
  .progress-wrap { position: relative; z-index: 1; }
  .progress-track { background: rgba(255,255,255,0.25); border-radius: 99px; height: 10px; overflow: hidden; }
  .progress-bar { background: white; height: 10px; border-radius: 99px; transition: width 0.6s cubic-bezier(.34,1.56,.64,1); }
  .progress-meta { display: flex; justify-content: space-between; margin-top: 6px; }
  .progress-meta span { color: rgba(255,255,255,0.75); font-size: 12px; font-weight: 700; }
  .over-budget .progress-bar { background: var(--amber); }
  .over-budget .budget-remaining { color: var(--amber); }

  /* TABS */
  .tabs { display: flex; gap: 8px; padding: 14px 20px 0; flex-shrink: 0; }
  .tab { flex: 1; text-align: center; font-size: 13px; font-weight: 800; padding: 9px 0; border-radius: 12px; cursor: pointer; transition: all 0.2s; color: var(--muted); background: transparent; border: none; }
  .tab.active { background: var(--card); color: var(--purple); box-shadow: 0 2px 12px rgba(108,92,231,0.15); }

  /* BODY */
  .body { flex: 1; overflow-y: auto; padding: 14px 20px calc(env(safe-area-inset-bottom, 0px) + 90px); -webkit-overflow-scrolling: touch; }
  .section-label { font-size: 11px; font-weight: 800; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; margin: 16px 0 8px; }
  .section-label:first-child { margin-top: 4px; }

  /* EXPENSE ITEMS */
  .expense-item { display: flex; align-items: flex-start; gap: 12px; background: var(--card); border-radius: 16px; padding: 12px 14px; margin-bottom: 8px; border: 1px solid var(--border); animation: slideIn 0.25s ease; transition: transform 0.1s; }
  .expense-item:active { transform: scale(0.98); }
  @keyframes slideIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
  .cat-icon { width: 40px; height: 40px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .exp-info { flex: 1; min-width: 0; }
  .exp-name { font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exp-cat { font-size: 11px; font-weight: 600; color: var(--muted); margin-top: 1px; }
  .exp-chips { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
  .exp-chip { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 6px; background: var(--bg); color: var(--muted); }
  .exp-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .exp-amt { font-size: 16px; font-weight: 900; color: var(--text); }
  .delete-btn { background: none; border: none; color: #ddd; font-size: 16px; cursor: pointer; padding: 2px; line-height: 1; }
  .delete-btn:active { color: var(--coral); }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
  .empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; font-weight: 700; }
  .empty-state small { font-size: 12px; }

  /* HISTORY */
  .history-week { background: var(--card); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.2s; }
  .history-week.expanded { border-color: rgba(108,92,231,0.28); }
  .history-week-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .history-week-title { font-size: 14px; font-weight: 800; color: var(--text); }
  .history-header-right { display: flex; align-items: center; gap: 8px; }
  .history-badge { font-size: 12px; font-weight: 800; padding: 3px 10px; border-radius: 99px; }
  .badge-ok       { background: #e8fdf5; color: #00b894; }
  .badge-over     { background: #fff3e0; color: var(--coral); }
  .badge-progress { background: #ede9ff; color: #6c5ce7; }
  .history-chevron { font-size: 16px; font-weight: 900; color: var(--muted); transition: transform 0.25s; line-height: 1; }
  .history-week.expanded .history-chevron { transform: rotate(90deg); }
  .history-amounts { display: flex; gap: 8px; }
  .history-amounts div { flex: 1; background: var(--bg); border-radius: 10px; padding: 8px 10px; }
  .hlabel { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .hval   { font-size: 16px; font-weight: 900; color: var(--text); margin-top: 2px; }
  .history-bar { height: 6px; background: #eee; border-radius: 99px; margin-top: 10px; overflow: hidden; }
  .history-bar-fill { height: 6px; border-radius: 99px; background: linear-gradient(90deg, var(--purple), var(--pink)); }

  /* HISTORY EXPANDED */
  .history-items { display: none; margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .history-week.expanded .history-items { display: block; }
  .h-exp-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .h-exp-item:last-child { border-bottom: none; }
  .h-exp-icon { width: 34px; height: 34px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; margin-top: 1px; }
  .h-exp-info { flex: 1; min-width: 0; }
  .h-exp-name { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .h-exp-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .h-exp-refl { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .refl-chip { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 5px; background: var(--bg); color: var(--muted); }
  .h-exp-amt { font-size: 14px; font-weight: 900; color: var(--text); flex-shrink: 0; padding-top: 2px; }

  /* FAB */
  .fab {
    position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 24px); left: 50%; transform: translateX(-50%);
    width: calc(100% - 40px); max-width: 390px;
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white; border: none; border-radius: 18px;
    padding: 16px; font-size: 16px; font-weight: 800;
    cursor: pointer; letter-spacing: 0.3px;
    box-shadow: 0 8px 24px rgba(108,92,231,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: 'Nunito', sans-serif; z-index: 10;
  }
  .fab:active { transform: translateX(-50%) scale(0.97); box-shadow: 0 4px 12px rgba(108,92,231,0.3); }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(30,20,60,0.55);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.25s; padding: 0;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); border-radius: 28px 28px 0 0;
    width: 100%; max-width: 430px; max-height: 93dvh;
    display: flex; flex-direction: column;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.34,1.26,.64,1);
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-top { padding: 20px 20px 0; flex-shrink: 0; }
  .modal-scroll { flex: 1; overflow-y: auto; padding: 0 20px; -webkit-overflow-scrolling: touch; }
  .modal-bottom { padding: 12px 20px calc(env(safe-area-inset-bottom, 0px) + 16px); flex-shrink: 0; }
  .modal-handle { width: 40px; height: 4px; background: #e0e0e0; border-radius: 99px; margin: 0 auto 20px; }
  .modal h2 { font-size: 20px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
  .modal label { font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; margin-top: 16px; }
  .modal input, .modal select, .modal textarea {
    width: 100%; padding: 13px 14px;
    border: 1.5px solid var(--border); border-radius: 14px;
    font-size: 16px; font-family: 'Nunito', sans-serif; font-weight: 700;
    color: var(--text); background: var(--bg); outline: none; appearance: none;
  }
  .modal textarea { resize: none; height: 72px; }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--purple); }

  /* CATEGORY GRID — 3 cols */
  .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cat-btn { padding: 10px 6px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; color: var(--muted); cursor: pointer; text-align: center; transition: all 0.15s; line-height: 1.3; }
  .cat-btn .cat-emoji { font-size: 19px; display: block; margin-bottom: 3px; }
  .cat-btn.selected { border-width: 2px; background: var(--card); }

  /* REFLECTION */
  .rfl-row { display: flex; gap: 8px; }
  .rfl-btn { flex: 1; padding: 10px 4px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 800; color: var(--muted); cursor: pointer; text-align: center; transition: all 0.15s; }
  .rfl-btn .rfl-emoji { font-size: 19px; display: block; margin-bottom: 3px; }
  .rfl-btn.selected { border-width: 2px; background: var(--card); }
  .vibe-row { display: flex; gap: 6px; }
  .vibe-btn { flex: 1; padding: 9px 3px; border-radius: 13px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Nunito', sans-serif; font-size: 10px; font-weight: 800; color: var(--muted); cursor: pointer; text-align: center; transition: all 0.15s; }
  .vibe-btn .vibe-emoji { font-size: 17px; display: block; margin-bottom: 2px; }
  .vibe-btn.selected { border-width: 2px; background: var(--card); }

  /* MODAL ACTIONS */
  .modal-actions { display: flex; gap: 10px; }
  .btn-cancel { flex: 1; padding: 14px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: var(--muted); cursor: pointer; }
  .btn-add    { flex: 2; padding: 14px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--purple), var(--pink)); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: white; cursor: pointer; }

  /* SETTINGS */
  .settings-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .settings-row:last-of-type { border-bottom: none; }
  .settings-label { font-size: 14px; font-weight: 800; color: var(--text); }
  .settings-hint  { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .settings-input { width: 105px; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: 800; color: var(--text); background: var(--bg); outline: none; text-align: right; }
  .settings-input:focus { border-color: var(--purple); }
  .btn-save   { width: 100%; padding: 14px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--purple), var(--pink)); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: white; cursor: pointer; }
  .btn-export { width: 100%; padding: 14px; border-radius: 14px; border: 1.5px solid var(--border); background: var(--bg); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 800; color: var(--purple); cursor: pointer; margin-top: 10px; }
</style>
</head>
<body>
<div id="app">
  <div class="header" id="header">
    <div class="header-top">
      <div>
        <div class="header-week" id="weekLabel">Week of —</div>
        <div class="budget-remaining"><span>$</span><span id="remainingAmt">0</span></div>
        <div class="budget-label" id="budgetLabel">left this week</div>
      </div>
      <button class="settings-btn" onclick="openSettings()">⚙️</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-meta">
        <span id="spentLabel">$0 spent</span>
        <span id="pctLabel">0% used</span>
      </div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('week',this)">This week</button>
    <button class="tab" onclick="showTab('history',this)">History</button>
  </div>

  <div class="body" id="mainBody"></div>
  <button class="fab" id="fabBtn" onclick="openAdd()">+ Add expense</button>
</div>

<!-- ADD EXPENSE MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-handle"></div>
      <h2>Add expense</h2>
    </div>
    <div class="modal-scroll">
      <label>Amount ($)</label>
      <input type="number" id="inputAmt" inputmode="decimal" placeholder="0.00" step="0.01">

      <label>What was it?</label>
      <input type="text" id="inputName" placeholder="e.g. Flat white">

      <label>Category</label>
      <div class="cat-grid" id="catGrid"></div>

      <label>Was this necessary?</label>
      <div class="rfl-row" id="necessaryRow">
        <button class="rfl-btn" onclick="selectReflect('necessary','yes',this)"><span class="rfl-emoji">✅</span>Yes</button>
        <button class="rfl-btn" onclick="selectReflect('necessary','maybe',this)"><span class="rfl-emoji">🤔</span>Maybe</button>
        <button class="rfl-btn" onclick="selectReflect('necessary','no',this)"><span class="rfl-emoji">❌</span>No</button>
      </div>

      <label>How do you feel about it?</label>
      <div class="vibe-row" id="vibeRow">
        <button class="vibe-btn" onclick="selectReflect('vibe','happy',this)"><span class="vibe-emoji">😊</span>Happy</button>
        <button class="vibe-btn" onclick="selectReflect('vibe','fine',this)"><span class="vibe-emoji">😐</span>Fine</button>
        <button class="vibe-btn" onclick="selectReflect('vibe','guilty',this)"><span class="vibe-emoji">😬</span>Guilty</button>
        <button class="vibe-btn" onclick="selectReflect('vibe','meh',this)"><span class="vibe-emoji">😒</span>Meh</button>
        <button class="vibe-btn" onclick="selectReflect('vibe','treat',this)"><span class="vibe-emoji">🎉</span>Treat!</button>
      </div>

      <label>Why? (optional)</label>
      <textarea id="inputNotes" placeholder="e.g. Just needed it after a long clinic…"></textarea>
      <div style="height:10px"></div>
    </div>
    <div class="modal-bottom">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal('addModal')">Cancel</button>
        <button class="btn-add" onclick="addExpense()">Add</button>
      </div>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-handle"></div>
      <h2>Settings</h2>
    </div>
    <div class="modal-scroll">
      <div class="settings-row">
        <div>
          <div class="settings-label">Default weekly budget</div>
          <div class="settings-hint">Used for weeks without a custom amount</div>
        </div>
        <input class="settings-input" type="number" id="defaultBudgetInput" inputmode="decimal" placeholder="150">
      </div>
      <div class="settings-row">
        <div>
          <div class="settings-label">This week's budget</div>
          <div class="settings-hint">Overrides default for this week only</div>
        </div>
        <input class="settings-input" type="number" id="thisWeekBudgetInput" inputmode="decimal" placeholder="150">
      </div>
    </div>
    <div class="modal-bottom">
      <button class="btn-save" onclick="saveBudget()">Save budgets</button>
      <button class="btn-export" onclick="exportCSV()">📤 Export to CSV</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────

const CATS = [
  { id:'food',          label:'Food & Coffee',  emoji:'☕', color:'#6c5ce7' },
  { id:'groceries',     label:'Groceries',       emoji:'🛒', color:'#00b894' },
  { id:'eatingout',     label:'Eating Out',      emoji:'🍔', color:'#e17055' },
  { id:'drinks',        label:'Drinks & Bars',   emoji:'🍸', color:'#e84393' },
  { id:'shopping',      label:'Shopping',        emoji:'🛍️', color:'#a29bfe' },
  { id:'transport',     label:'Transport',       emoji:'🚗', color:'#0984e3' },
  { id:'entertainment', label:'Entertainment',   emoji:'🎉', color:'#fdcb6e' },
  { id:'health',        label:'Health',          emoji:'💊', color:'#55efc4' },
  { id:'fitness',       label:'Fitness',         emoji:'💪', color:'#fd79a8' },
  { id:'household',     label:'Household',       emoji:'🏠', color:'#74b9ff' },
  { id:'education',     label:'Education',       emoji:'📚', color:'#fab1a0' },
  { id:'other',         label:'Other',           emoji:'📦', color:'#b2bec3' },
];

const NECESSARY_LABELS = { yes:'✅ Yes', maybe:'🤔 Maybe', no:'❌ No' };
const VIBE_LABELS       = { happy:'😊 Happy', fine:'😐 Fine', guilty:'😬 Guilty', meh:'😒 Meh', treat:'🎉 Treat!' };

function loadData() {
  const raw = localStorage.getItem('spendly_data');
  if (!raw) return { defaultBudget:150, weekBudgets:{}, expenses:[] };
  const d = JSON.parse(raw);
  // Migrate legacy format (single budget field)
  if (d.budget !== undefined && d.defaultBudget === undefined) {
    d.defaultBudget = d.budget;
    delete d.budget;
  }
  if (!d.weekBudgets) d.weekBudgets = {};
  if (!d.defaultBudget) d.defaultBudget = 150;
  return d;
}
function saveData(d) { localStorage.setItem('spendly_data', JSON.stringify(d)); }

function getWeekBudget(weekStart, data) {
  const key = weekStart.toISOString();
  return (data.weekBudgets && data.weekBudgets[key] != null)
    ? data.weekBudgets[key]
    : (data.defaultBudget || 150);
}

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────

// Returns Wednesday 5am start of the budget week containing `from` (default: now)
function getWeekStart(from) {
  const d = from ? new Date(from) : new Date();
  const day = d.getDay(); // 0=Sun … 3=Wed
  const diff = day >= 3 ? day - 3 : day + 4;
  const start = new Date(d);
  start.setDate(d.getDate() - diff);
  start.setHours(5, 0, 0, 0);
  if (!from && new Date() < start) start.setDate(start.getDate() - 7);
  return start;
}

function getWeekEnd(start) {
  const e = new Date(start);
  e.setDate(start.getDate() + 7);
  return e;
}

function formatDate(d) {
  return d.toLocaleDateString('en-NZ', { day:'numeric', month:'short' });
}

function fmtAmt(n) { return n.toFixed(2).replace(/\.00$/, ''); }

// ─── STATE ────────────────────────────────────────────────────────────────────

let currentTab     = 'week';
let selectedCat    = 'food';
let selectedNec    = null;   // necessary
let selectedVibe   = null;
let expandedWeeks  = new Set();

// ─── CATEGORY GRID ───────────────────────────────────────────────────────────

function initCatGrid() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  CATS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c.id === selectedCat ? ' selected' : '');
    if (c.id === selectedCat) { btn.style.borderColor = c.color; btn.style.color = c.color; }
    btn.innerHTML = `<span class="cat-emoji">${c.emoji}</span>${c.label}`;
    btn.onclick = () => {
      selectedCat = c.id;
      document.querySelectorAll('.cat-btn').forEach(b => { b.classList.remove('selected'); b.style.borderColor=''; b.style.color=''; });
      btn.classList.add('selected');
      btn.style.borderColor = c.color;
      btn.style.color = c.color;
    };
    grid.appendChild(btn);
  });
}

// ─── REFLECTION SELECTORS ────────────────────────────────────────────────────

function selectReflect(type, val, btn) {
  const rowId = type === 'necessary' ? 'necessaryRow' : 'vibeRow';
  document.querySelectorAll(`#${rowId} button`).forEach(b => {
    b.classList.remove('selected'); b.style.borderColor=''; b.style.color='';
  });
  btn.classList.add('selected');
  btn.style.borderColor = '#6c5ce7';
  btn.style.color = '#6c5ce7';
  if (type === 'necessary') selectedNec  = val;
  else                       selectedVibe = val;
}

// ─── MODAL OPEN / CLOSE ──────────────────────────────────────────────────────

function openAdd() {
  document.getElementById('inputAmt').value   = '';
  document.getElementById('inputName').value  = '';
  document.getElementById('inputNotes').value = '';
  selectedCat = 'food'; selectedNec = null; selectedVibe = null;
  initCatGrid();
  document.querySelectorAll('.rfl-btn, .vibe-btn').forEach(b => {
    b.classList.remove('selected'); b.style.borderColor=''; b.style.color='';
  });
  document.getElementById('addModal').classList.add('open');
  setTimeout(() => document.getElementById('inputAmt').focus(), 350);
}

function openSettings() {
  const d  = loadData();
  const ws = getWeekStart();
  document.getElementById('defaultBudgetInput').value   = d.defaultBudget;
  document.getElementById('thisWeekBudgetInput').value  = getWeekBudget(ws, d);
  document.getElementById('settingsModal').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ─── SAVE / ADD / DELETE ─────────────────────────────────────────────────────

function saveBudget() {
  const d       = loadData();
  const defVal  = parseFloat(document.getElementById('defaultBudgetInput').value);
  const wkVal   = parseFloat(document.getElementById('thisWeekBudgetInput').value);
  if (!isNaN(defVal) && defVal > 0) d.defaultBudget = defVal;
  if (!isNaN(wkVal)  && wkVal  > 0) {
    const ws = getWeekStart();
    d.weekBudgets[ws.toISOString()] = wkVal;
  }
  saveData(d);
  render();
  closeModal('settingsModal');
}

function addExpense() {
  const amt  = parseFloat(document.getElementById('inputAmt').value);
  const name = document.getElementById('inputName').value.trim();
  const notes = document.getElementById('inputNotes').value.trim();
  if (isNaN(amt) || amt <= 0) { document.getElementById('inputAmt').focus(); return; }
  const label = name || CATS.find(c => c.id === selectedCat).label;
  const d = loadData();
  d.expenses.push({
    id:        Date.now(),
    amount:    amt,
    name:      label,
    category:  selectedCat,
    date:      new Date().toISOString(),
    necessary: selectedNec,
    vibe:      selectedVibe,
    notes:     notes || null,
  });
  saveData(d);
  closeModal('addModal');
  render();
}

function deleteExpense(id) {
  const d = loadData();
  d.expenses = d.expenses.filter(e => e.id !== id);
  saveData(d);
  render();
}

// ─── TABS ─────────────────────────────────────────────────────────────────────

function showTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('fabBtn').style.display = tab === 'week' ? 'block' : 'none';
  render();
}

// ─── RENDERING ────────────────────────────────────────────────────────────────

function groupByDay(expenses) {
  const groups = {};
  const today     = new Date(); today.setHours(0,0,0,0);
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  expenses.forEach(e => {
    const ed = new Date(e.date); ed.setHours(0,0,0,0);
    let label;
    if (ed.getTime() === today.getTime())     label = 'Today';
    else if (ed.getTime() === yesterday.getTime()) label = 'Yesterday';
    else label = ed.toLocaleDateString('en-NZ', { weekday:'long', day:'numeric', month:'short' });
    if (!groups[label]) groups[label] = [];
    groups[label].push(e);
  });
  return groups;
}

function catFor(e) { return CATS.find(c => c.id === e.category) || CATS[CATS.length - 1]; }

function renderExpenseItem(e) {
  const cat   = catFor(e);
  const chips = [];
  if (e.necessary) chips.push(`<span class="exp-chip">${NECESSARY_LABELS[e.necessary]}</span>`);
  if (e.vibe)      chips.push(`<span class="exp-chip">${VIBE_LABELS[e.vibe]}</span>`);
  if (e.notes)     chips.push(`<span class="exp-chip">💬 ${e.notes.slice(0,32)}${e.notes.length>32?'…':''}</span>`);
  return `<div class="expense-item">
    <div class="cat-icon" style="background:${cat.color}22">${cat.emoji}</div>
    <div class="exp-info">
      <div class="exp-name">${e.name}</div>
      <div class="exp-cat">${cat.label}</div>
      ${chips.length ? `<div class="exp-chips">${chips.join('')}</div>` : ''}
    </div>
    <div class="exp-right">
      <div class="exp-amt">$${fmtAmt(e.amount)}</div>
      <button class="delete-btn" onclick="deleteExpense(${e.id})">✕</button>
    </div>
  </div>`;
}

function renderHistoryItems(expenses) {
  if (!expenses.length) return '<div style="font-size:12px;color:var(--muted);padding:6px 0">No expenses logged.</div>';
  return expenses
    .slice().sort((a,b) => new Date(b.date)-new Date(a.date))
    .map(e => {
      const cat   = catFor(e);
      const refl  = [];
      if (e.necessary) refl.push(`<span class="refl-chip">${NECESSARY_LABELS[e.necessary]}</span>`);
      if (e.vibe)      refl.push(`<span class="refl-chip">${VIBE_LABELS[e.vibe]}</span>`);
      if (e.notes)     refl.push(`<span class="refl-chip">💬 ${e.notes.slice(0,40)}${e.notes.length>40?'…':''}</span>`);
      const ds = new Date(e.date).toLocaleDateString('en-NZ', { weekday:'short', day:'numeric', month:'short' });
      return `<div class="h-exp-item">
        <div class="h-exp-icon" style="background:${cat.color}22">${cat.emoji}</div>
        <div class="h-exp-info">
          <div class="h-exp-name">${e.name}</div>
          <div class="h-exp-meta">${cat.label} · ${ds}</div>
          ${refl.length ? `<div class="h-exp-refl">${refl.join('')}</div>` : ''}
        </div>
        <div class="h-exp-amt">$${fmtAmt(e.amount)}</div>
      </div>`;
    }).join('');
}

function historyWeekCard({ start, end, expenses, budget, isCurrentWeek }) {
  const spent    = expenses.reduce((s,e) => s + e.amount, 0);
  const pct      = Math.min(100, (spent / budget) * 100);
  const diff     = budget - spent;
  const ok       = diff >= 0;
  const key      = start.toISOString();
  const expanded = expandedWeeks.has(key);

  let badge, diffColor, diffLabel;
  if (isCurrentWeek) {
    badge = `<div class="history-badge badge-progress">In progress</div>`;
    diffLabel = ok ? 'Remaining' : 'Over by';
    diffColor = ok ? '#6c5ce7' : '#e17055';
  } else {
    badge = `<div class="history-badge ${ok?'badge-ok':'badge-over'}">${ok?'Under':'Over'}</div>`;
    diffLabel = ok ? 'Saved' : 'Over by';
    diffColor = ok ? '#00b894' : '#e17055';
  }

  const borderStyle = isCurrentWeek ? 'border: 1.5px solid rgba(108,92,231,0.28);' : '';

  return `<div class="history-week ${expanded?'expanded':''}" style="${borderStyle}" onclick="toggleWeek('${key}')">
    <div class="history-week-header">
      <div class="history-week-title">${formatDate(start)} – ${formatDate(end)}</div>
      <div class="history-header-right">
        ${badge}
        <div class="history-chevron">›</div>
      </div>
    </div>
    <div class="history-amounts">
      <div><div class="hlabel">${isCurrentWeek?'Spent so far':'Spent'}</div><div class="hval">$${fmtAmt(spent)}</div></div>
      <div><div class="hlabel">${diffLabel}</div><div class="hval" style="color:${diffColor}">$${fmtAmt(Math.abs(diff))}</div></div>
      <div><div class="hlabel">Budget</div><div class="hval">$${fmtAmt(budget)}</div></div>
    </div>
    <div class="history-bar"><div class="history-bar-fill" style="width:${pct}%"></div></div>
    <div class="history-items">${renderHistoryItems(expenses)}</div>
  </div>`;
}

function toggleWeek(key) {
  if (expandedWeeks.has(key)) expandedWeeks.delete(key);
  else expandedWeeks.add(key);
  render();
}

function renderWeek() {
  const d          = loadData();
  const ws         = getWeekStart();
  const we         = getWeekEnd(ws);
  const budget     = getWeekBudget(ws, d);
  const weekExp    = d.expenses.filter(e => { const t = new Date(e.date); return t >= ws && t < we; })
                               .sort((a,b) => new Date(b.date) - new Date(a.date));
  const spent      = weekExp.reduce((s,e) => s + e.amount, 0);
  const remaining  = budget - spent;
  const pct        = Math.min(100, (spent / budget) * 100);

  document.getElementById('weekLabel').textContent    = 'Week of ' + formatDate(ws);
  document.getElementById('remainingAmt').textContent = Math.abs(remaining).toFixed(2).replace(/\.00$/,'');
  document.getElementById('spentLabel').textContent   = '$' + fmtAmt(spent) + ' spent';
  document.getElementById('pctLabel').textContent     = Math.round(pct) + '% used';
  document.getElementById('progressBar').style.width  = pct + '%';
  document.getElementById('header').className         = 'header' + (remaining < 0 ? ' over-budget' : '');

  const body = document.getElementById('mainBody');
  if (!weekExp.length) {
    body.innerHTML = `<div class="empty-state"><div class="emoji">🎉</div><p>No expenses yet!</p><small>Tap + Add expense to get started</small></div>`;
    return;
  }
  const groups = groupByDay(weekExp);
  let html = '';
  for (const [day, items] of Object.entries(groups)) {
    html += `<div class="section-label">${day}</div>`;
    items.forEach(e => { html += renderExpenseItem(e); });
  }
  body.innerHTML = html;
}

function renderHistory() {
  const d  = loadData();
  const ws = getWeekStart();
  const we = getWeekEnd(ws);

  const currentExp = d.expenses.filter(e => { const t = new Date(e.date); return t >= ws && t < we; });

  let html = historyWeekCard({
    start: ws, end: we, expenses: currentExp,
    budget: getWeekBudget(ws, d), isCurrentWeek: true
  });

  // Past weeks
  let hasAny = currentExp.length > 0;
  for (let i = 1; i <= 12; i++) {
    const ps = new Date(ws); ps.setDate(ws.getDate() - 7 * i);
    const pe = new Date(ps); pe.setDate(ps.getDate() + 7);
    const exp = d.expenses.filter(e => { const t = new Date(e.date); return t >= ps && t < pe; });
    if (!exp.length) continue;
    hasAny = true;
    html += historyWeekCard({ start:ps, end:pe, expenses:exp, budget: getWeekBudget(ps, d), isCurrentWeek:false });
  }

  if (!hasAny) {
    document.getElementById('mainBody').innerHTML = `<div class="empty-state"><div class="emoji">📅</div><p>No history yet</p><small>Come back next week!</small></div>`;
    return;
  }
  document.getElementById('mainBody').innerHTML = html;
}

function render() {
  if (currentTab === 'week') renderWeek();
  else renderHistory();
}

// ─── CSV EXPORT ──────────────────────────────────────────────────────────────

function exportCSV() {
  const d = loadData();
  const rows = [['Date','Week Start','Name','Category','Amount ($)','Necessary','Vibe','Notes']];
  d.expenses
    .slice().sort((a,b) => new Date(a.date)-new Date(b.date))
    .forEach(e => {
      const cat = catFor(e);
      const esc = v => v ? `"${String(v).replace(/"/g,'""')}"` : '';
      rows.push([
        new Date(e.date).toLocaleDateString('en-NZ'),
        getWeekStart(e.date).toLocaleDateString('en-NZ'),
        esc(e.name),
        esc(cat.label),
        e.amount.toFixed(2),
        e.necessary || '',
        e.vibe || '',
        esc(e.notes || ''),
      ]);
    });
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `spendly-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ─── INIT ────────────────────────────────────────────────────────────────────

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
});

render();
setInterval(render, 60000);
</script>
